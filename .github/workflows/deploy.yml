name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt JavaScript actions into Node 24 ahead of GitHub's 2026-06-16 forced cutover.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.report.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate build report
        id: report
        run: |
          set -euo pipefail

          pages=$(find _site -name 'index.html' | wc -l | tr -d ' ')
          photos=$(find src/images/gallery -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' \) | wc -l | tr -d ' ')
          variants=$(find _site/img -type f 2>/dev/null | wc -l | tr -d ' ')
          size=$(du -sh _site | awk '{print $1}')

          # Extract empty-category list from the auto-generated report.
          # The data layer writes to archive/EMPTY_CATEGORIES.md on every build.
          empty_count=0
          empty_lines=""
          if [ -f archive/EMPTY_CATEGORIES.md ]; then
            empty_count=$(grep -c '^| `src/images/gallery/' archive/EMPTY_CATEGORIES.md || true)
            empty_lines=$(grep '^| `src/images/gallery/' archive/EMPTY_CATEGORIES.md || true)
          fi

          {
            echo "### 🏗️ Build report"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Pages | $pages |"
            echo "| Gallery photos (source) | $photos |"
            echo "| Image variants generated | $variants |"
            echo "| Output size | $size |"
            echo ""
            if [ "$empty_count" -gt 0 ]; then
              echo "> ⚠️ **$empty_count empty category** in \`src/images/gallery/\`. Skipped from the site so no broken pages appear."
              echo ""
              echo "$empty_lines"
              echo ""
              echo "See [\`archive/EMPTY_CATEGORIES.md\`](archive/EMPTY_CATEGORIES.md) for details and recovery steps."
            else
              echo "> ✅ No empty gallery categories."
            fi
          } > /tmp/report.md

          # Job summary — visible on every workflow run.
          cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"

          # Stash the report so the PR-comment job can read it.
          {
            echo 'report<<REPORT_EOF'
            cat /tmp/report.md
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload empty-categories report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: empty-categories-report
          path: archive/EMPTY_CATEGORIES.md
          if-no-files-found: warn
          retention-days: 1

  comment:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post / update sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-report
          message: ${{ needs.build.outputs.report }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-status:
    # Sync the README "Current build state" section with the live empty-categories
    # list. Runs only on push-to-main; pushes back to main using a PAT because
    # the github-actions bot can't bypass the main_protect ruleset on this repo
    # (personal repos don't allow Integration actors in bypass_actors).
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with PAT for push-back)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN }}

      - name: Download empty-categories report
        uses: actions/download-artifact@v4
        with:
          name: empty-categories-report
          path: archive/

      - name: Rewrite README section between markers
        run: |
          python3 - <<'PY'
          import re, pathlib

          empty = []
          src = pathlib.Path("archive/EMPTY_CATEGORIES.md")
          if src.exists():
              for line in src.read_text().splitlines():
                  m = re.match(r"^\| `(src/images/gallery/[^`]+)`", line)
                  if m:
                      empty.append(m.group(1))

          if empty:
              noun = "category" if len(empty) == 1 else "categories"
              inner = f"⚠️ **{len(empty)} empty gallery {noun}:**\n\n"
              for p in empty:
                  inner += f"- `{p}`\n"
              inner += "\nSee [`archive/EMPTY_CATEGORIES.md`](archive/EMPTY_CATEGORIES.md) for restore/cleanup steps."
          else:
              inner = "✅ All gallery categories have at least one photo."

          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text()
          new_section = f"<!-- empty-cats:start -->\n{inner}\n<!-- empty-cats:end -->"
          updated = re.sub(
              r"<!-- empty-cats:start -->.*?<!-- empty-cats:end -->",
              new_section,
              readme,
              count=1,
              flags=re.DOTALL,
          )
          if updated == readme:
              print("README markers unchanged (or missing).")
          readme_path.write_text(updated)
          PY

      - name: Commit if README or EMPTY_CATEGORIES.md changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md archive/EMPTY_CATEGORIES.md
          if git diff --cached --quiet; then
            echo "No status changes to commit."
            exit 0
          fi
          git commit -m "Sync README empty-cats section [skip ci]"
          git push
